<!DOCTYPE html>
<html lang="sq">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pema Familjare — Vensi Hajdari</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Password gate -->
  <div id="password-gate">
    <div id="password-box">
      <h2>Pema Familjare</h2>
      <p>Kjo faqe është e mbrojtur me fjalëkalim.</p>
      <input type="password" id="password-input" placeholder="Fjalëkalimi..." autocomplete="current-password" />
      <button id="password-submit">Hyr</button>
      <p id="password-error" style="display:none;">Fjalëkalim i gabuar. Provo përsëri.</p>
    </div>
  </div>

  <style>
    #password-gate {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Roboto, Arial, Helvetica, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #password-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding: 40px 48px;
      background: rgba(240,240,235,0.97);
      border: 1px solid #d0cfc0;
      border-radius: 10px;
      box-shadow: 0 2px 14px rgba(0,0,0,0.10);
      min-width: 280px;
    }
    #password-box h2 {
      margin: 0;
      color: #c8a020;
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    #password-box p {
      margin: 0;
      color: #555555;
      font-size: 0.85rem;
    }
    #password-input {
      width: 100%;
      padding: 10px 14px;
      background: #ffffff;
      border: 1px solid #d0cfc0;
      border-radius: 6px;
      color: #111111;
      font-size: 1rem;
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }
    #password-input:focus { border-color: #c8a020; }
    #password-submit {
      width: 100%;
      padding: 10px;
      background: #c8a020;
      border: none;
      border-radius: 6px;
      color: #111111;
      font-weight: 700;
      font-size: 1rem;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    #password-submit:hover { background: #e8c840; }
    #password-error { color: #cc3333 !important; font-size: 0.82rem !important; }
  </style>

  <script>
    (function () {
      var gate = document.getElementById('password-gate');
      var input = document.getElementById('password-input');
      var btn = document.getElementById('password-submit');
      var err = document.getElementById('password-error');
      var KEY = 'fam_unlocked';

      if (sessionStorage.getItem(KEY) === '1') {
        gate.style.display = 'none';
        return;
      }

      function attempt() {
        if (input.value === 'k9&L#vB2$p@8!zQ%W#7m') {
          sessionStorage.setItem(KEY, '1');
          gate.style.display = 'none';
        } else {
          err.style.display = 'block';
          input.value = '';
          input.focus();
        }
      }

      btn.addEventListener('click', attempt);
      input.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') attempt();
      });
    })();
  </script>

  <!-- Full-screen pannable/zoomable viewport -->
  <div id="viewport">
    <div id="canvas">
      <svg id="ribbon-svg" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="nodes-layer"></div>
    </div>
  </div>

  <!-- Legend — fixed to viewport, always visible -->
  <div id="legend">
    <div class="legend-row">
      <span class="legend-icon" style="color:#c8a020;">♛</span>
      <span>Mbret ose Mbretëreshë</span>
    </div>
    <div class="legend-row">
      <span class="legend-icon" style="color:#111111;">✦</span>
      <span>Djalë i Vetëm</span>
    </div>
  </div>

  <!-- Reset-view button -->
  <button id="btn-reset" title="Kthehu te Vensi">⌂</button>

  <!-- Tooltip -->
  <div id="tooltip">
    <span class="tt-name"></span>
    <span class="tt-dates"></span>
    <span class="tt-title"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
